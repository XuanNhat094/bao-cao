<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Công Việc</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .card { max-width: 500px; margin: auto; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 15px; }
        .card-header { background: #0d6efd; color: white; border-radius: 15px 15px 0 0 !important; text-align: center; padding: 20px; }
        .btn-submit { width: 100%; padding: 12px; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        #loading { display: none; }
        .form-label { font-weight: 600; color: #444; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <h4 class="mb-0">CẬP NHẬT BÁO CÁO</h4>
    </div>
    <div class="card-body p-4">
        <div class="mb-3">
            <label class="form-label">Ngày thực hiện</label>
            <input type="date" id="ngay" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Nội dung công việc</label>
            <textarea id="noidung" class="form-control" rows="3" placeholder="Nhập chi tiết công việc..."></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Trạng thái</label>
            <select id="trangthai" class="form-select">
                <option value="Kiểm tra">⚪ Kiểm tra</option>
                <option value="Đang thực hiện">🔵 Đang thực hiện</option>
                <option value="Hoàn thành">✅ Hoàn thành</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Nhân sự thực hiện</label>
            <input type="text" id="nhansu" class="form-control" placeholder="Tên nhân viên">
        </div>

        <div class="mb-3">
            <label class="form-label">Ghi chú</label>
            <input type="text" id="ghichu" class="form-control" placeholder="Lưu ý thêm (nếu có)">
        </div>

        <button onclick="updateWorkReport()" id="btnSubmit" class="btn btn-primary btn-submit">
            <span id="btnText">GỬI BÁO CÁO</span>
            <span id="loading" class="spinner-border spinner-border-sm" role="status"></span>
        </button>
    </div>
</div>

<script>
    // Tự động điền ngày hôm nay vào ô Date khi mở trang
    window.onload = () => {
        document.getElementById('ngay').value = new Date().toISOString().split('T')[0];
    };

    function showLoading(isLoading) {
        const btn = document.getElementById('btnSubmit');
        const text = document.getElementById('btnText');
        const loader = document.getElementById('loading');
        
        btn.disabled = isLoading;
		text.innerText = isLoading ? "ĐANG XỬ LÝ..." : "GỬI BÁO CÁO";
        loader.style.display = isLoading ? "inline-block" : "none";
    }

    async function updateWorkReport() {
        // Thu thập dữ liệu
        const data = {
            action: "updateReport",
            ngay: document.getElementById('ngay').value,
            noidung: document.getElementById('noidung').value,
            trangthai: document.getElementById('trangthai').value,
            nhansu: document.getElementById('nhansu').value,
            ghichu: document.getElementById('ghichu').value
        };

        // Kiểm tra dữ liệu trống
        if (!data.ngay || !data.noidung || !data.nhansu) {
            alert("⚠️ Vui lòng nhập đủ các thông tin quan trọng!");
            return;
        }

        if (!confirm(`Xác nhận cập nhật báo cáo cho: ${data.nhansu}?`)) return;

        showLoading(true);

        try {
            // Gọi trực tiếp hàm trong Apps Script (Cách này mượt và ổn định hơn fetch POST)
            google.script.run
                .withSuccessHandler((res) => {
                    showLoading(false);
                    if (res === "Thành công") {
                        alert("🎉 Đã cập nhật lên Google Sheets!");
                        // Reset form
                        document.getElementById('noidung').value = "";
                        document.getElementById('ghichu').value = "";
                    } else {
                        alert("Lỗi: " + res);
                    }
                })
                .withFailureHandler((err) => {
                    showLoading(false);
                    alert("❌ Lỗi hệ thống: " + err);
                })
                .addData(data); // "addData" là tên hàm trong file .gs của bạn

        } catch (e) {
            showLoading(false);
            alert("❌ Lỗi kết nối hoặc quyền truy cập!");
        }
    }
</script>

</body>
</html>
